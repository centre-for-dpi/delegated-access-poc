{{define "credential_row.html"}}
<tr id="cred-row-{{.Cred.ID}}" class="border-b border-gray-50 hover:bg-gray-50">
    <td class="py-3 px-3">
        <span class="font-medium text-gray-900">{{.Cred.TypeName}}</span>
    </td>
    <td class="py-3 px-3 text-gray-600">{{.Cred.SubjectName}}</td>
    <td class="py-3 px-3 text-gray-400 font-mono text-xs">{{.Cred.StatusListIndex}}</td>
    <td class="py-3 px-3">
        {{if eq .Cred.Status "revoked"}}
        <span class="inline-flex items-center gap-1 px-2.5 py-0.5 rounded-full text-xs font-medium bg-red-50 text-red-600">
            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
            </svg>Revoked
        </span>
        {{else}}
        <span class="inline-flex items-center gap-1 px-2.5 py-0.5 rounded-full text-xs font-medium bg-green-50 text-green-800">
            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
            </svg>Active
        </span>
        {{end}}
    </td>
    <td class="py-3 px-3 text-xs text-gray-400">{{.Cred.IssuedAt}}</td>
    <td class="py-3 px-3 text-right">
        {{if eq .Cred.Status "revoked"}}
        <button hx-post="/issuers/{{.Cred.IssuerID}}/credentials/{{.Cred.ID}}/reinstate"
                hx-target="#cred-row-{{.Cred.ID}}"
                hx-swap="outerHTML"
                hx-confirm="Are you sure you want to reinstate this credential?"
                class="inline-flex items-center text-xs font-medium rounded-full bg-green-50 hover:bg-green-100 text-green-800 px-3 py-1 transition-colors">
            Reinstate
        </button>
        {{else}}
        <button hx-post="/issuers/{{.Cred.IssuerID}}/credentials/{{.Cred.ID}}/revoke"
                hx-target="#cred-row-{{.Cred.ID}}"
                hx-swap="outerHTML"
                hx-confirm="Are you sure you want to revoke this credential?"
                class="inline-flex items-center text-xs font-medium rounded-full bg-red-50 hover:bg-red-100 text-red-600 px-3 py-1 transition-colors">
            Revoke
        </button>
        {{end}}
    </td>
</tr>
{{end}}
