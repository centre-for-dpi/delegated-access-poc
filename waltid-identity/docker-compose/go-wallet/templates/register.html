{{define "content"}}
<div class="min-h-screen flex">
    <!-- Left: Registration Form -->
    <div class="flex-1 flex items-center justify-center px-6 py-12">
        <div class="w-full max-w-sm">
            <!-- Logo -->
            <div class="flex items-center gap-3 mb-8">
                <svg class="w-10 h-10" viewBox="0 0 40 40" fill="none">
                    <rect width="40" height="40" rx="20" fill="url(#grad)"/>
                    <path d="M12 15h8v3h-8z" fill="#E6F6FF"/>
                    <path d="M28 21l-2-.3c-1.3 7.3-9.3 7.3-9.3 7.3l-.3 2.3c8.3.3 11-5.3 11.6-9.3z" fill="#E6F6FF"/>
                    <defs><linearGradient id="grad" x1="0" y1="0" x2="40" y2="40"><stop stop-color="#0573F0"/><stop offset="1" stop-color="#03449E"/></linearGradient></defs>
                </svg>
                <div>
                    <p class="text-lg font-bold text-gray-900">GO WALLET</p>
                    <p class="text-xs text-gray-400">Create your identity wallet</p>
                </div>
            </div>

            {{if .Error}}
            <div class="mb-4 flex items-center gap-2 rounded-lg border border-red-200 bg-red-50 px-4 py-3">
                <svg class="w-5 h-5 text-red-500 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L4.082 16.5c-.77.833.192 2.5 1.732 2.5z"></path>
                </svg>
                <p class="text-sm text-red-700">{{.Error}}</p>
            </div>
            {{end}}

            <form method="POST" action="/register" class="space-y-4">
                <div>
                    <label for="email" class="block text-sm font-medium text-gray-600 mb-1">Email</label>
                    <input type="email" id="email" name="email" required
                           class="w-full rounded-lg border border-gray-200 px-4 py-2.5 text-sm focus:ring-2 focus:ring-primary-400 focus:border-primary-400 outline-none"
                           placeholder="you@example.com">
                </div>
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-600 mb-1">Password</label>
                    <input type="password" id="password" name="password" required minlength="4"
                           class="w-full rounded-lg border border-gray-200 px-4 py-2.5 text-sm focus:ring-2 focus:ring-primary-400 focus:border-primary-400 outline-none"
                           placeholder="Choose a password">
                </div>
                <div>
                    <label for="confirm" class="block text-sm font-medium text-gray-600 mb-1">Confirm Password</label>
                    <input type="password" id="confirm" name="confirm" required minlength="4"
                           class="w-full rounded-lg border border-gray-200 px-4 py-2.5 text-sm focus:ring-2 focus:ring-primary-400 focus:border-primary-400 outline-none"
                           placeholder="Confirm your password">
                </div>
                <button type="submit"
                        class="w-full rounded-xl bg-gradient-to-r from-primary-400 to-primary-700 text-white font-semibold py-3 text-sm hover:from-primary-500 hover:to-primary-800 transition-all duration-200 shadow-md">
                    Create Account
                </button>
            </form>

            <p class="mt-6 text-center text-sm text-gray-500">
                Already have an account?
                <a href="/login" class="font-medium text-primary-500 hover:text-primary-600">Sign in</a>
            </p>

            <p class="mt-8 text-center text-xs text-gray-300">Powered by Go Wallet</p>
        </div>
    </div>

    <!-- Right: Branding (desktop only) -->
    <div class="hidden lg:flex flex-1 bg-gradient-to-br from-primary-400 to-primary-900 items-center justify-center">
        <div class="text-center text-white px-12">
            <svg class="w-32 h-32 mx-auto mb-8 opacity-90" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
                <rect x="2" y="5" width="20" height="15" rx="3"/>
                <path d="M16 10a2 2 0 11-4 0 2 2 0 014 0z"/>
                <path d="M2 10h6M16 10h6"/>
            </svg>
            <h2 class="text-3xl font-bold mb-3">Create Your Wallet</h2>
            <p class="text-primary-100 text-sm leading-relaxed max-w-xs mx-auto">
                A unique Ed25519 keypair and DID will be generated for your new wallet automatically.
            </p>
        </div>
    </div>
</div>
{{end}}
