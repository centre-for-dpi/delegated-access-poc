{{define "claim_result.html"}}
{{if .Error}}
<div class="rounded-xl border border-red-200 bg-red-50 p-5">
    <div class="flex items-start gap-3">
        <svg class="w-5 h-5 text-red-500 mt-0.5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
        </svg>
        <div>
            <p class="text-sm font-medium text-red-700">Failed to receive credential</p>
            <p class="text-xs text-red-500 mt-1">{{.Error}}</p>
        </div>
    </div>
</div>
{{else}}
<div class="rounded-xl border border-green-200 bg-green-50 p-5">
    <div class="flex items-start gap-3">
        <div class="w-8 h-8 rounded-full bg-green-100 flex items-center justify-center shrink-0">
            <svg class="w-5 h-5 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
            </svg>
        </div>
        <div class="flex-1">
            <p class="text-sm font-semibold text-green-800 mb-1">Credential received</p>
            <!-- Mini credential card -->
            <div class="credential-card rounded-xl p-4 mt-3 mb-3">
                <p class="text-white text-sm font-bold">{{.Credential.TypeName}}</p>
                {{if .Credential.IssuerDID}}
                <p class="text-primary-100 text-xs mt-1 opacity-80">{{.Credential.IssuerDID}}</p>
                {{end}}
            </div>
            <div class="flex items-center gap-3 mt-3">
                <a href="/credentials/{{urlEncode .Credential.ID}}"
                   class="inline-flex items-center gap-1.5 rounded-lg bg-white border border-gray-200 px-4 py-2 text-xs font-semibold text-gray-700 hover:bg-gray-50 shadow-sm transition-colors">
                    View credential
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                    </svg>
                </a>
                <a href="/"
                   class="inline-flex items-center gap-1.5 text-xs font-medium text-gray-400 hover:text-gray-600">
                    All credentials
                </a>
            </div>
        </div>
    </div>
</div>
{{end}}
{{end}}
