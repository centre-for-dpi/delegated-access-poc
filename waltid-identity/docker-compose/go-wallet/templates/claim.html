{{define "content"}}
<div class="min-h-screen">
    <!-- Header -->
    <header class="bg-white border-b border-gray-100 h-16 flex items-center px-6">
        <div class="flex items-center gap-3 flex-1">
            <a href="/" class="flex items-center gap-2">
                <svg class="w-8 h-8" viewBox="0 0 40 40" fill="none">
                    <rect width="40" height="40" rx="20" fill="url(#grad)"/>
                    <path d="M12 15h8v3h-8z" fill="#E6F6FF"/>
                    <path d="M28 21l-2-.3c-1.3 7.3-9.3 7.3-9.3 7.3l-.3 2.3c8.3.3 11-5.3 11.6-9.3z" fill="#E6F6FF"/>
                    <defs><linearGradient id="grad" x1="0" y1="0" x2="40" y2="40"><stop stop-color="#0573F0"/><stop offset="1" stop-color="#03449E"/></linearGradient></defs>
                </svg>
                <span class="text-sm font-bold text-gray-900 hidden sm:block">GO WALLET</span>
            </a>
        </div>
        <div class="flex items-center gap-4">
            <span class="text-xs text-gray-400 hidden sm:block">{{.Email}}</span>
            <a href="/logout" class="text-xs text-gray-400 hover:text-red-500">Sign out</a>
        </div>
    </header>

    <!-- Main -->
    <main class="max-w-2xl mx-auto px-4 sm:px-6 py-8">
        <!-- Breadcrumb -->
        <div class="flex items-center gap-2 mb-6">
            <a href="/" class="text-sm text-gray-400 hover:text-primary-500">Credentials</a>
            <svg class="w-3 h-3 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
            </svg>
            <span class="text-sm text-gray-600">Receive</span>
        </div>

        <h1 class="text-2xl font-bold text-gray-900 mb-2">Receive Credential</h1>
        <p class="text-sm text-gray-400 mb-8">Accept a verifiable credential from an issuer</p>

        <!-- Mode toggle -->
        <div class="flex rounded-xl bg-gray-100 p-1 mb-6" id="mode-toggle">
            <button type="button" onclick="setMode('scan')" id="btn-scan"
                    class="flex-1 rounded-lg py-2.5 text-sm font-medium transition-all text-gray-500">
                <span class="flex items-center justify-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z"></path>
                    </svg>
                    Scan QR Code
                </span>
            </button>
            <button type="button" onclick="setMode('url')" id="btn-url"
                    class="flex-1 rounded-lg py-2.5 text-sm font-medium transition-all bg-white shadow text-gray-900">
                <span class="flex items-center justify-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"></path>
                    </svg>
                    Enter URL
                </span>
            </button>
        </div>

        <!-- Scan mode -->
        <div id="mode-scan" class="hidden">
            <div class="bg-gray-900 rounded-2xl overflow-hidden aspect-square max-w-sm mx-auto relative">
                <video id="qr-video" class="w-full h-full object-cover"></video>
                <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
                    <div class="w-48 h-48 border-2 border-white/50 rounded-2xl"></div>
                </div>
                <div id="scan-status" class="absolute bottom-4 left-0 right-0 text-center text-white text-sm">
                    Point camera at credential offer QR code
                </div>
            </div>
            <p class="text-xs text-gray-400 text-center mt-3">Camera access required for QR scanning</p>
        </div>

        <!-- URL mode -->
        <div id="mode-url">
            <form hx-post="/claim" hx-target="#claim-result" hx-swap="innerHTML" hx-indicator="#claim-spinner">
                <label for="offerURL" class="block text-sm font-medium text-gray-600 mb-2">Credential Offer URL</label>
                <textarea id="offerURL" name="offerURL" rows="4"
                          class="w-full border border-gray-200 rounded-xl p-4 text-sm font-mono focus:ring-2 focus:ring-primary-400 focus:border-primary-400 outline-none resize-none"
                          placeholder="openid-credential-offer://?credential_offer=...">{{.OfferURL}}</textarea>

                <div class="flex items-center gap-3 mt-4">
                    <button type="submit"
                            class="htmx-hide-on-request inline-flex items-center gap-2 rounded-xl bg-gradient-to-r from-primary-700 to-primary-900 px-6 py-3 text-sm font-semibold text-white hover:from-primary-800 hover:to-primary-900 transition-all shadow-md">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
                        </svg>
                        Receive credential
                    </button>
                    <div id="claim-spinner" class="htmx-indicator flex items-center gap-2 text-sm text-gray-400">
                        <svg class="animate-spin h-5 w-5 text-primary-500" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                        </svg>
                        Claiming credential...
                    </div>
                </div>
            </form>
        </div>

        <div id="claim-result" class="mt-6"></div>
    </main>
</div>

<script>
function setMode(mode) {
    const scanDiv = document.getElementById('mode-scan');
    const urlDiv = document.getElementById('mode-url');
    const btnScan = document.getElementById('btn-scan');
    const btnUrl = document.getElementById('btn-url');

    if (mode === 'scan') {
        scanDiv.classList.remove('hidden');
        urlDiv.classList.add('hidden');
        btnScan.className = 'flex-1 rounded-lg py-2.5 text-sm font-medium transition-all bg-white shadow text-gray-900';
        btnUrl.className = 'flex-1 rounded-lg py-2.5 text-sm font-medium transition-all text-gray-500';
        startCamera();
    } else {
        scanDiv.classList.add('hidden');
        urlDiv.classList.remove('hidden');
        btnUrl.className = 'flex-1 rounded-lg py-2.5 text-sm font-medium transition-all bg-white shadow text-gray-900';
        btnScan.className = 'flex-1 rounded-lg py-2.5 text-sm font-medium transition-all text-gray-500';
        stopCamera();
    }
}

let videoStream = null;
let scanInterval = null;

function startCamera() {
    const video = document.getElementById('qr-video');
    const status = document.getElementById('scan-status');

    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        status.textContent = 'Camera not supported in this browser';
        return;
    }

    navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
        .then(stream => {
            videoStream = stream;
            video.srcObject = stream;
            video.play();
            status.textContent = 'Scanning for QR code...';

            // Use BarcodeDetector API if available
            if ('BarcodeDetector' in window) {
                const detector = new BarcodeDetector({ formats: ['qr_code'] });
                scanInterval = setInterval(async () => {
                    try {
                        const barcodes = await detector.detect(video);
                        for (const barcode of barcodes) {
                            if (barcode.rawValue && barcode.rawValue.startsWith('openid-credential-offer://')) {
                                document.getElementById('offerURL').value = barcode.rawValue;
                                status.textContent = 'QR code detected!';
                                setMode('url');
                                // Auto-submit
                                document.querySelector('#mode-url form').dispatchEvent(new Event('submit', {bubbles: true}));
                                return;
                            }
                        }
                    } catch (e) {}
                }, 500);
            } else {
                status.textContent = 'QR scanning requires BarcodeDetector API (Chrome 83+)';
            }
        })
        .catch(err => {
            status.textContent = 'Camera access denied';
        });
}

function stopCamera() {
    if (scanInterval) { clearInterval(scanInterval); scanInterval = null; }
    if (videoStream) { videoStream.getTracks().forEach(t => t.stop()); videoStream = null; }
}
</script>
{{end}}
