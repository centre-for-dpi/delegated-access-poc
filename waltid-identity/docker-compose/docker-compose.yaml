services:
  wallet-api:
    image: ${IMAGE_PREFIX}waltid/wallet-api:${VERSION_TAG:-latest}
    profiles:
      - services
      - identity
      - all
    pull_policy: missing
    depends_on:
      postgres:
        condition: service_healthy
      caddy:
        condition: service_started
    env_file:
      - .env
    extra_hosts:
      - "$SERVICE_HOST:host-gateway"
      - "waltid.enterprise.localhost:host-gateway"
    volumes:
      - ./wallet-api/config:/waltid-wallet-api/config
      - ./wallet-api/data:/waltid-wallet-api/data

  issuer-api:
    image: ${IMAGE_PREFIX}waltid/issuer-api:${VERSION_TAG:-latest}
    profiles:
      - services
      - identity
      - all
    pull_policy: missing
    depends_on:
      - caddy
    env_file:
      - .env
    volumes:
      - ./issuer-api/config:/waltid-issuer-api/config

  verifier-api:
    image: adammwaniki/adamrepo:stable
    profiles:
      - services
      - identity
      - all
    pull_policy: missing
    depends_on:
      - caddy
    env_file:
      - .env
    volumes:
      - ./verifier-api/config:/waltid-verifier-api/config
    environment:
      OPA_SERVER_URL: "http://opa-server:8181"

  verifier-api2:
    image: ${IMAGE_PREFIX}waltid/verifier-api2:${VERSION_TAG:-latest}
    profiles:
      - services
      - identity
      - all
    pull_policy: missing
    depends_on:
      - caddy
    env_file:
      - .env
    volumes:
      - ./verifier-api2/config:/waltid-verifier-api2/config


  waltid-demo-wallet:
    image: ${IMAGE_PREFIX}waltid/waltid-demo-wallet:${VERSION_TAG:-latest}
    profiles:
      - apps
      - identity
      - all
    pull_policy: missing
    build:
      context: ../
      dockerfile: waltid-applications/waltid-web-wallet/apps/waltid-demo-wallet/Dockerfile
    depends_on:
      - wallet-api
      - caddy
    environment:
      NUXT_PUBLIC_ISSUER_CALLBACK_URL: "http://$SERVICE_HOST:$DEMO_WALLET_FRONTEND_PORT"
      NUXT_PUBLIC_DEV_WALLET_URL: "http://$SERVICE_HOST:$DEV_WALLET_FRONTEND_PORT"
      PORT: $DEMO_WALLET_FRONTEND_PORT

  waltid-dev-wallet:
    image: ${IMAGE_PREFIX}waltid/waltid-dev-wallet:${VERSION_TAG:-latest}
    profiles:
      - apps
      - identity
      - all
    pull_policy: missing
    build:
      context: ../
      dockerfile: waltid-applications/waltid-web-wallet/apps/waltid-dev-wallet/Dockerfile
    depends_on:
      - wallet-api
      - caddy
    environment:
      NUXT_PUBLIC_ISSUER_CALLBACK_URL: "http://$SERVICE_HOST:$DEV_WALLET_FRONTEND_PORT"
      NUXT_PUBLIC_DEMO_WALLET_URL: "http://$SERVICE_HOST:$DEMO_WALLET_FRONTEND_PORT"
      PORT: $DEV_WALLET_FRONTEND_PORT

  web-portal:
    image: ${IMAGE_PREFIX}waltid/portal:${VERSION_TAG:-latest}
    profiles:
      - apps
      - identity
      - all
    pull_policy: missing
    build:
      context: ../
      dockerfile: waltid-applications/waltid-web-portal/Dockerfile
    depends_on:
      - caddy
    environment:
      NEXT_PUBLIC_VC_REPO: "http://$SERVICE_HOST:$VC_REPO_PORT"
      NEXT_PUBLIC_ISSUER: "http://$SERVICE_HOST:$ISSUER_API_PORT"
      NEXT_PUBLIC_VERIFIER: "http://$SERVICE_HOST:$VERIFIER_API_PORT"
      NEXT_PUBLIC_WALLET: "http://$SERVICE_HOST:$DEMO_WALLET_FRONTEND_PORT"
      PORT: $WEB_PORTAL_PORT

  verification-adapter:
    build:
      context: ./verification-adapter-waltid
      dockerfile: Dockerfile
    profiles:
      - apps
      - identity
      - all
    depends_on:
      - caddy
    environment:
      PORT: $VERIFICATION_ADAPTER_PORT
      SERVICE_HOST: $SERVICE_HOST
      VERIFIER_API_PORT: $VERIFIER_API_PORT
      DEMO_WALLET_FRONTEND_PORT: $DEMO_WALLET_FRONTEND_PORT
      ISSUER_PORTAL_PORT: $ISSUER_PORTAL_PORT
    extra_hosts:
      - "$SERVICE_HOST:host-gateway"

  vc-repo:
    platform: linux/amd64
    image: ${IMAGE_PREFIX}waltid/vc-repository:${VERSION_VC_REPO:-latest}
    profiles:
      - services
      - identity
      - all
    pull_policy: missing
    build:
      context: ../waltid-applications/waltid-credentials/.
    depends_on:
      - caddy
    environment:
      PORT: $VC_REPO_PORT

  valkey:
    image: valkey/valkey:${VERSION_VALKEY:-7.2}
    profiles:
      - valkey
      - all
    container_name: valkey
    healthcheck:
      test: [ "CMD", "valkey-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: always
    command: ["valkey-server", "--bind", "0.0.0.0", "--port", "6379"]
    ports:
      - "${VALKEY_PORT:-6379}:6379"
    volumes:
      - valkey_data:/data

  postgres:
    image: postgres
    healthcheck:
      test: [ "CMD", "pg_isready", "-q", "-U", "$DB_USERNAME" ]
      interval: 5s
      timeout: 1s
      retries: 5
    restart: always
    environment:
      POSTGRES_DB: $DB_NAME
      POSTGRES_USER: $DB_USERNAME
      POSTGRES_PASSWORD: $DB_PASSWORD
    volumes:
      - wallet-api-db:/waltid-wallet-api/data
    ports:
      - $POSTGRES_DB_PORT:5432 #TODO: tcp/udp proxy with caddy

  vault:
    image: hashicorp/vault:${VERSION_VAULT:-latest}
    profiles:
      - tse
      - all
    container_name: vault
    healthcheck:
      test: ["CMD-SHELL", "vault status || exit 1"]
      interval: 5s
      timeout: 2s
      retries: 5
    volumes:
      - ./vault/config.hcl:/vault/config/config.hcl
      - vault_data:/vault/file
    ports:
      - "$VAULT_PORT:8200"
    environment:
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:$VAULT_PORT"
      VAULT_ADDR: "http://127.0.0.1:$VAULT_PORT"
    command: server -config=/vault/config/config.hcl -dev -dev-root-token-id="dev-only-token"
    restart: always

  vault-init:
    image: hashicorp/vault:${VERSION_VAULT:-latest}
    profiles:
      - tse
      - all
    container_name: vault-init
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: "dev-only-token"
      VAULT_ADDR: "http://vault:$VAULT_PORT"
    depends_on:
      vault:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c", "/vault/scripts/init.sh"]
    volumes:
      - ./vault/init.sh:/vault/scripts/init.sh

  issuer-portal:
    build:
      context: ./issuer-portal
      dockerfile: Dockerfile
    profiles:
      - apps
      - identity
      - all
    depends_on:
      - caddy
      - issuer-api
    environment:
      PORT: $ISSUER_PORTAL_PORT
      SERVICE_HOST: $SERVICE_HOST
      ISSUER_API_PORT: $ISSUER_API_PORT
      DEMO_WALLET_FRONTEND_PORT: $DEMO_WALLET_FRONTEND_PORT
      GO_WALLET_PORT: $GO_WALLET_PORT
      ISSUER_API_CONFIG_DIR: /issuer-api-config
    extra_hosts:
      - "$SERVICE_HOST:host-gateway"
    volumes:
      - issuer-portal-data:/app/data
      - ./issuer-api/config:/issuer-api-config
      - /var/run/docker.sock:/var/run/docker.sock

  verification-portal:
    build:
      context: ./verification-portal
      dockerfile: Dockerfile
    profiles:
      - apps
      - identity
      - all
    depends_on:
      - caddy
    environment:
      PORT: $VERIFICATION_PORTAL_PORT
      SERVICE_HOST: $SERVICE_HOST
      VERIFIER_API_PORT: $VERIFIER_API_PORT
      DEMO_WALLET_FRONTEND_PORT: $DEMO_WALLET_FRONTEND_PORT
      ISSUER_PORTAL_PORT: $ISSUER_PORTAL_PORT
    extra_hosts:
      - "$SERVICE_HOST:host-gateway"

  inji-verify-postgres:
    image: postgres:13
    profiles:
      - apps
      - identity
      - all
    healthcheck:
      test: ["CMD", "pg_isready", "-q", "-U", "inji_user"]
      interval: 5s
      timeout: 1s
      retries: 5
    restart: always
    environment:
      POSTGRES_DB: inji_verify
      POSTGRES_USER: inji_user
      POSTGRES_PASSWORD: inji_pass
    volumes:
      - inji-verify-db:/var/lib/postgresql/data

  inji-verify-service:
    image: mosipid/inji-verify-service:0.16.0
    profiles:
      - apps
      - identity
      - all
    pull_policy: missing
    depends_on:
      inji-verify-postgres:
        condition: service_healthy
      caddy:
        condition: service_started
    # 'verify-service' alias lets inji-verify-ui's bundled nginx resolve the upstream
    networks:
      default:
        aliases:
          - verify-service
    environment:
      DATABASE_HOST: inji-verify-postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: inji_verify
      DATABASE_SCHEMA: verify
      DATABASE_USERNAME: inji_user
      DATABASE_PASSWORD: inji_pass
      INJI_VP_REQUEST_LONG_POLLING_TIMEOUT: 55000
      INJI_VP_SUBMISSION_BASE_URL: "http://$SERVICE_HOST:$INJI_VERIFY_UI_PORT/v1/verify"
      INJI_DID_VERIFY_URI: "did:web:$SERVICE_HOST%3A$INJI_VERIFY_UI_PORT:v1:verify"
      INJI_DID_VERIFY_PUBLIC_KEY_URI: "did:web:$SERVICE_HOST%3A$INJI_VERIFY_UI_PORT:v1:verify#key-0"
      INJI_KEYSTORE_FILE_PASS: mosip
    extra_hosts:
      - "$SERVICE_HOST:host-gateway"

  inji-verify-ui:
    image: mosipid/inji-verify-ui:0.16.0
    profiles:
      - apps
      - identity
      - all
    pull_policy: missing
    depends_on:
      - inji-verify-service
      - caddy
    entrypoint:
      - /bin/sh
      - -c
      - "envsubst < /etc/inji-verify/config.template.json > /usr/share/nginx/html/assets/config.json && nginx -g 'daemon off;'"
    environment:
      DEFAULT_TITLE: "Inji Verify"
      DEFAULT_LANG: en
      VERIFIABLE_CLAIMS_CONFIG_URL: /assets/config.json
      VP_SUBMISSION_SUPPORTED: "true"
      CLIENT_ID: inji-verify-ui
      CLIENT_ID_DID: "did:web:$SERVICE_HOST%3A$INJI_VERIFY_UI_PORT:v1:verify"
      DISPLAY_TIMEOUT: 120000
      SERVICE_HOST: $SERVICE_HOST
      INJI_VERIFY_UI_PORT: $INJI_VERIFY_UI_PORT
    volumes:
      - ./inji-verify/config.template.json:/etc/inji-verify/config.template.json
    extra_hosts:
      - "$SERVICE_HOST:host-gateway"

  pixelpass-adapter:
    build:
      context: ./pixelpass-adapter
      dockerfile: Dockerfile
    profiles:
      - apps
      - identity
      - all
    depends_on:
      - caddy
    environment:
      PORT: $PIXELPASS_ADAPTER_PORT
      SERVICE_HOST: $SERVICE_HOST
      WALLET_API_URL: "http://go-wallet:$GO_WALLET_PORT"
      INJI_VERIFY_URL: "http://$SERVICE_HOST:$INJI_VERIFY_UI_PORT"
    extra_hosts:
      - "$SERVICE_HOST:host-gateway"

  go-wallet:
    build:
      context: ./go-wallet
      dockerfile: Dockerfile
    profiles:
      - apps
      - identity
      - all
    depends_on:
      - caddy
    environment:
      PORT: $GO_WALLET_PORT
      SERVICE_HOST: $SERVICE_HOST
      ISSUER_PORTAL_URL: "http://issuer-portal:$ISSUER_PORTAL_PORT"
      PIXELPASS_ADAPTER_URL: "http://pixelpass-adapter:$PIXELPASS_ADAPTER_PORT"
      PIXELPASS_ADAPTER_PORT: $PIXELPASS_ADAPTER_PORT
      INJI_VERIFY_UI_PORT: $INJI_VERIFY_UI_PORT
    extra_hosts:
      - "$SERVICE_HOST:host-gateway"
    volumes:
      - go-wallet-data:/app/data

  oidc4vp-adapter:
    build:
      context: ./oidc4vp-adapter
      dockerfile: Dockerfile
    profiles:
      - apps
      - identity
      - all
    depends_on:
      - caddy
    environment:
      PORT: $OIDC4VP_ADAPTER_PORT
      SERVICE_HOST: $SERVICE_HOST
      ISSUER_PORTAL_URL: "http://issuer-portal:$ISSUER_PORTAL_PORT"
      INJI_VERIFY_SERVICE_URL: "http://inji-verify-service:8080"
      GO_WALLET_PORT: $GO_WALLET_PORT
    extra_hosts:
      - "$SERVICE_HOST:host-gateway"

  opa-server:
    platform: linux/amd64
    image: openpolicyagent/opa:${VERSION_OPA:-latest}
    container_name: opa-server
    profiles:
      - opa
      - all
    ports:
      - "$OPA_SERVER_PORT:8181"
    command: [ "run", "--server", "--addr", ":8181" ]
    extra_hosts:
      - "$SERVICE_HOST:host-gateway"

  caddy:
    image: docker.io/caddy:2
    restart: unless-stopped
    env_file:
      - .env
    cap_add:
      - NET_ADMIN
    ports:

      - target: "$WALLET_BACKEND_PORT"
        published: $WALLET_BACKEND_PORT # wallet-api
        protocol: tcp
        mode: host

      - target: "$ISSUER_API_PORT"
        published: $ISSUER_API_PORT # issuer-api
        protocol: tcp
        mode: host

      - target: "$VERIFIER_API_PORT"
        published: $VERIFIER_API_PORT # verifier-api
        protocol: tcp
        mode: host

      - target: "$VERIFIER_API2_PORT"
        published: $VERIFIER_API2_PORT # verifier-api2
        protocol: tcp
        mode: host

      - target: "$DEMO_WALLET_FRONTEND_PORT"
        published: $DEMO_WALLET_FRONTEND_PORT # waltid-demo-wallet
        protocol: tcp
        mode: host

      - target: "$DEV_WALLET_FRONTEND_PORT"
        published: $DEV_WALLET_FRONTEND_PORT # waltid-dev-wallet
        protocol: tcp
        mode: host

      - target: "$WEB_PORTAL_PORT"
        published: $WEB_PORTAL_PORT # web-portal
        protocol: tcp
        mode: host

      - target: "$VC_REPO_PORT"
        published: $VC_REPO_PORT # vc-repo
        protocol: tcp
        mode: host

      - target: "$VERIFICATION_ADAPTER_PORT"
        published: $VERIFICATION_ADAPTER_PORT # verification-adapter
        protocol: tcp
        mode: host

      - target: "$ISSUER_PORTAL_PORT"
        published: $ISSUER_PORTAL_PORT # issuer-portal
        protocol: tcp
        mode: host

      - target: "$VERIFICATION_PORTAL_PORT"
        published: $VERIFICATION_PORTAL_PORT # verification-portal
        protocol: tcp
        mode: host

      - target: "$INJI_VERIFY_UI_PORT"
        published: $INJI_VERIFY_UI_PORT # inji-verify-ui (+ inji-verify-service via /v1/verify/*)
        protocol: tcp
        mode: host

      - target: "$PIXELPASS_ADAPTER_PORT"
        published: $PIXELPASS_ADAPTER_PORT # pixelpass-adapter
        protocol: tcp
        mode: host

      - target: "$GO_WALLET_PORT"
        published: $GO_WALLET_PORT # go-wallet
        protocol: tcp
        mode: host

      - target: "$OIDC4VP_ADAPTER_PORT"
        published: $OIDC4VP_ADAPTER_PORT # oidc4vp-adapter
        protocol: tcp
        mode: host

      - target: "$PG_ADMIN_PORT"
        published: $PG_ADMIN_PORT # pg-admin
        protocol: tcp
        mode: host

    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
volumes:
  wallet-api-db:
  vault_data:
  valkey_data:
  issuer-portal-data:
  go-wallet-data:
  inji-verify-db:
